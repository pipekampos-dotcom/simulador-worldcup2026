<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Mundial 2026 - Master FIFA</title>
    
    <meta property="og:title" content="Simulador Mundial 2026 - Master FIFA">
    <meta property="og:description" content="Simula los cruces exactos con la matriz oficial del Apéndice C de la FIFA y el sistema de enfrentamiento directo.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/2026_FIFA_World_Cup_logo.svg/1200px-2026_FIFA_World_Cup_logo.svg.png">
    <meta name="theme-color" content="#0056b3">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Simulador Mundial 2026</h1>
    
    <div class="controles-guardado">
        <button class="btn btn-guardar" onclick="guardarDatos()">💾 Guardar Progreso</button>
        <button class="btn btn-borrar" onclick="borrarDatos()">🗑️ Borrar Datos</button>
        <button class="btn btn-theme" onclick="toggleTema()" id="btnTheme">🌙 Modo Oscuro</button>
    </div>

    <div class="info-box">
        <strong>Sistema Master Activo:</strong> Arquitectura modular en GitHub. Sincronización de datos lista (fetch). Desempate por enfrentamiento directo, Apéndice C y penales operativos.
    </div>

    <h2>Fase de Grupos</h2>
    <div id="contenedor-grupos" class="grid-grupos"></div>

    <div class="bracket-wrapper" style="border-top: 5px solid #0056b3; margin-top: 0; margin-bottom: 40px;">
        <h2>Clasificación Global: Mejores Terceros</h2>
        <div id="contenedor-terceros" class="table-responsive"></div>
    </div>

    <div class="bracket-wrapper">
        <h2>Fase Eliminatoria</h2>
        <div id="contenedor-bracket" class="tournament-bracket"></div>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
