<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test API-Football</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #0f0f1a; color: #e0e0e0; }
        h2 { color: #fff; }
        button { background: #2979ff; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; cursor: pointer; }
        button:hover { background: #1565c0; }
        #resultado { margin-top: 24px; background: #1a1a2e; border-radius: 10px; padding: 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; min-height: 60px; }
        .ok  { color: #4caf50; }
        .err { color: #f44336; }
    </style>
</head>
<body>
    <h2>⚽ Test API-Football</h2>
    <p style="color:#aaa; font-size:14px;">Verifica que tu API key funciona correctamente.</p>
    <button onclick="probar()">🔍 Probar conexión</button>
    <div id="resultado">Haz clic en el botón para probar...</div>

    <script>
        async function probar() {
            const el = document.getElementById("resultado");
            el.textContent = "Consultando...";
            el.className = "";

            try {
                const res = await fetch("https://v3.football.api-sports.io/status", {
                    headers: { "x-apisports-key": "15da44817cc7cd70a26c7ebc51419543" }
                });
                const data = await res.json();

                if (data.response) {
                    const r = data.response;
                    el.className = "ok";
                    el.textContent =
                        `✅ API key válida\n\n` +
                        `Plan:           ${r.subscription?.plan || "—"}\n` +
                        `Peticiones hoy: ${r.requests?.current || 0} / ${r.requests?.limit_day || "—"}\n` +
                        `Activo:         ${r.subscription?.active ? "Sí" : "No"}`;
                } else {
                    el.className = "err";
                    el.textContent = "❌ Respuesta inesperada:\n" + JSON.stringify(data, null, 2);
                }
            } catch (e) {
                el.className = "err";
                el.textContent = "❌ Error de conexión:\n" + e.message;
            }
        }
    </script>
</body>
</html>
